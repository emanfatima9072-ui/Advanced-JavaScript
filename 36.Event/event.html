<!----Event Object discussion-->

<!-------------------------Event Propagation------------------------------------------------------>
<!-- The third parameter of addEventListener controls event propagation
    There is two context of event Propagation:
     1.event bubbling (deafult -> false)
     2.event capturing (top to bottom)
    **Event Propagation menas how event travel through html element when it occurs
    **Event bubbling : event travel from innermost element to outward
    e.g :
    <body>
    <div>
        <button>click</button>
    </div>
   </body> -->
    <!-- in this case event travel button -> div-> body-> document
    .event first happen to child then travel to parent
    **Event capturing:event travel from outer element to inner
      first parent then travel to child  
      reverse the order we consider in event bubbling
    ***To Stop Event Propagation : we use event object with method
      e.stopPropagation() using this will stop bubbling
      also discuss e.preventDefault(google link example) -->
